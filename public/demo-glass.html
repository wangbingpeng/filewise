<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案二：毛玻璃拟态风格</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      color: #fff;
    }
    
    .app { display: flex; flex-direction: column; height: 100vh; }
    
    /* 毛玻璃卡片基础样式 */
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    /* 顶部标题栏 */
    .header { 
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px; 
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header h1 { 
      font-size: 18px; font-weight: 700; 
      background: linear-gradient(90deg, #fff, #e0e0e0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; 
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      font-size: 14px; color: rgba(255,255,255,0.7); 
      width: 300px;
      transition: all 0.3s;
    }
    .search-box:focus-within {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .search-box svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.5); }
    .btn-primary {
      padding: 10px 20px; 
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff; border-radius: 12px; 
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-primary:hover { 
      background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.15));
      transform: translateY(-2px);
    }
    
    /* 主体区域 */
    .main { display: flex; flex: 1; overflow: hidden; }
    
    /* 左侧文件夹列表 */
    .sidebar { 
      width: 260px; padding: 20px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar-title {
      font-size: 11px; font-weight: 700; 
      color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0 12px; margin-bottom: 12px;
    }
    .folder-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; 
      border-radius: 14px; cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 6px;
    }
    .folder-item:hover { 
      background: rgba(255, 255, 255, 0.1);
    }
    .folder-item.active { 
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .folder-item svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.7); }
    .folder-info { flex: 1; }
    .folder-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .folder-count { font-size: 12px; color: rgba(255,255,255,0.5); }
    
    /* 右侧文件列表 */
    .content { flex: 1; padding: 28px; overflow-y: auto; }
    .content-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .content-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .content-path { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 6px; }
    
    .file-list { display: flex; flex-direction: column; gap: 12px; }
    .file-card {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px; 
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      cursor: pointer; transition: all 0.3s;
    }
    .file-card:hover { 
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .file-icon {
      width: 48px; height: 48px; 
      background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; 
      display: flex; align-items: center; justify-content: center;
    }
    .file-icon svg { width: 24px; height: 24px; stroke: rgba(255,255,255,0.8); }
    .file-info { flex: 1; }
    .file-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .file-meta { font-size: 13px; color: rgba(255,255,255,0.5); }
    .file-meta span { margin-right: 12px; }
    .tag { 
      padding: 6px 14px; 
      background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; 
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>FileWise</h1>
      <div class="search-box">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <span>搜索文件...</span>
      </div>
      <button class="btn-primary">+ 添加文件夹</button>
    </header>
    
    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-title">文件夹</div>
        <div class="folder-item active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
          </svg>
          <div class="folder-info">
            <div class="folder-name">工具平台</div>
            <div class="folder-count">15 个文件</div>
          </div>
        </div>
        <div class="folder-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
          </svg>
          <div class="folder-info">
            <div class="folder-name">客户案例</div>
            <div class="folder-count">3 个文件</div>
          </div>
        </div>
      </aside>
      
      <main class="content">
        <div class="content-header">
          <div>
            <div class="content-title">工具平台</div>
            <div class="content-path">源路径：/浏览器上传/工具平台</div>
          </div>
          <button class="btn-primary">开始处理</button>
        </div>
        
        <div class="file-list">
          <div class="file-card">
            <div class="file-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <div class="file-info">
              <div class="file-name">数据库自治产品DAS介绍.pptx</div>
              <div class="file-meta"><span>DAS/</span><span>PPTX · 57.8 MB</span></div>
            </div>
            <span class="tag">已提取</span>
          </div>
          <div class="file-card">
            <div class="file-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <div class="file-info">
              <div class="file-name">DMS产品介绍2024 v1.1.pptx</div>
              <div class="file-meta"><span>PPTX · 66.3 MB</span></div>
            </div>
            <span class="tag">已提取</span>
          </div>
          <div class="file-card">
            <div class="file-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <div class="file-info">
              <div class="file-name">DMS数据库管理介绍-对外.pdf</div>
              <div class="file-meta"><span>PDF · 10.2 MB</span></div>
            </div>
            <span class="tag">已提取</span>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
